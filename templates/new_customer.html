<!-- templates/new_customer.html -->
{% extends "base.html" %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="ios-card">
            <h3 class="fw-semibold"><i class="bi bi-person-badge me-2"></i>Customer Details</h3>
            <p class="text-muted">Enter customer information to start storing items</p>
            <form method="POST">
                <div class="mb-3">
                    <label class="form-label fw-medium">Full Name *</label>
                    <input type="text" name="name" class="form-control search-bar" placeholder="John Appleseed" required>
                </div>
                <div class="mb-3">
                    <label class="form-label fw-medium">Phone Number *</label>
                    <input type="tel" name="phone" class="form-control search-bar" placeholder="+1234567890" required>
                </div>
                <div class="mb-3">
                    <label class="form-label fw-medium">Email (Optional)</label>
                    <input type="email" name="email" class="form-control search-bar" placeholder="customer@example.com">
                </div>
                <button type="submit" class="btn btn-primary ios-button ios-button-primary w-100">
                    <i class="bi bi-arrow-right-circle"></i> Continue to Store Item
                </button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
