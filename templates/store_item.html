{% extends "base.html" %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-7">
        <div class="ios-card">
            <div class="d-flex align-items-center mb-3">
                <i class="bi bi-person-circle fs-1 me-3" style="color: #007AFF;"></i>
                <div>
                    <h4 class="mb-0">{{ customer.name }}</h4>
                    <small class="text-muted">{{ customer.phone }}</small>
                </div>
            </div>
            <hr>
            <h5><i class="bi bi-box me-2"></i>Store New Item</h5>
            <form method="POST" enctype="multipart/form-data">
                <div class="mb-3">
                    <label class="form-label">Item Description</label>
                    <textarea name="description" class="form-control search-bar" rows="2" placeholder="e.g., Blue suitcase, Laptop bag..." required></textarea>
                </div>
                <div class="mb-3">
                    <label class="form-label">Take a Photo</label>
                    <input type="file" name="photo" class="form-control" accept="image/*" capture="environment">
                    <div class="form-text">Snap a picture of the item</div>
                </div>
                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label class="form-label">Storage Price (₦)</label>
                        <input type="number" name="storage_price" step="0.01" class="form-control search-bar" value="10000.00" required>
                        <div class="form-text">Price in Nigerian Naira</div>
                    </div>
                    <div class="col-md-6 mb-3">
                        <label class="form-label">Payment Type</label>
                        <select name="payment_type" class="form-select search-bar" required>
                            <option value="half">Half Payment (50%)</option>
                            <option value="full">Full Payment (100%)</option>
                        </select>
                    </div>
                </div>
                <div class="mb-3">
                    <label class="form-label">Initial Payment (₦)</label>
                    <input type="number" name="amount_paid" step="0.01" class="form-control search-bar" value="0.00">
                    <div class="form-text">Amount customer is paying now (in Naira)</div>
                </div>
                <button type="submit" class="btn btn-primary ios-button ios-button-primary w-100">
                    <i class="bi bi-cloud-upload"></i> Store Item
                </button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
